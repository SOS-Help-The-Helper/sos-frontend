name: CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks on the working tree
        # --no-git scans HEAD file contents only. Git history still contains
        # pre-rotation secrets; the history purge is scheduled after credential
        # rotation, at which point this can switch to a full-history scan.
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --config .gitleaks.toml --no-banner --redact
