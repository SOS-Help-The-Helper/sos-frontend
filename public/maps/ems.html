<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOS | EMS Tactical View</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',sans-serif;background:#0F1E2B;color:#fff}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.hdr{position:absolute;top:0;left:0;right:0;z-index:10;padding:16px 24px;
  background:linear-gradient(180deg,rgba(15,30,43,0.95),rgba(15,30,43,0));
  display:flex;align-items:center;gap:14px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400}
.hdr .sub{font-size:11px;color:rgba(255,255,255,0.45)}
.badge{background:#EF4E4B;font-size:9px;font-weight:700;padding:3px 10px;border-radius:99px;
  text-transform:uppercase;letter-spacing:0.8px;animation:pb 2s infinite}
@keyframes pb{0%,100%{opacity:1}50%{opacity:0.6}}
.panel{position:absolute;top:76px;right:16px;z-index:10;width:260px;
  background:rgba(15,30,43,0.92);backdrop-filter:blur(20px);border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);padding:16px}
.panel h3{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,0.35);margin-bottom:10px;font-weight:700}
.st{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.st:last-child{border:none}
.st .lb{font-size:12px;color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.st .v{font-size:15px;font-weight:700}
.ctrls{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px}
.btn{padding:7px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(15,30,43,0.85);backdrop-filter:blur(10px);color:#fff;font-size:10px;
  font-weight:700;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.6px}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn.on{background:#EF4E4B;border-color:#EF4E4B}
.leg{position:absolute;bottom:24px;right:16px;z-index:10;
  background:rgba(15,30,43,0.85);backdrop-filter:blur(10px);border-radius:10px;padding:10px 14px}
.li{display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(255,255,255,0.55);margin-bottom:3px}
.li:last-child{margin:0}
</style></head><body>
<div id="map"></div>
<div class="hdr">
  <svg width="26" height="26" viewBox="0 0 40 40" fill="none"><path d="M33.34 34.91L25.99 27.56C24.47 29.05 22.56 30.63 20.18 32.27C17.78 30.62 15.87 29.04 14.35 27.53L6.83 35.05C10.35 38.13 14.96 40 20 40C25.12 40 29.8 38.07 33.34 34.91Z" fill="#EF4E4B"/><path d="M26.84 12.55C24.88 11.94 22.66 12.3 21.15 13.86L20.18 14.87L19.21 13.86C17.69 12.29 15.45 11.93 13.49 12.56L6.33 5.4C9.9 2.05 14.71 0 20 0C25.37 0 30.24 2.11 33.83 5.55L26.84 12.55Z" fill="#EF4E4B"/><path d="M6.27 7.85L5.09 6.66C1.93 10.2 0 14.88 0 20C0 25.37 2.11 30.24 5.55 33.83L6.73 32.65C3.59 29.36 1.67 24.91 1.67 20C1.67 15.37 3.38 11.14 6.21 7.92L6.27 7.85Z" fill="#EF4E4B"/><path d="M33.42 32.49L34.6 33.67C37.95 30.1 40 25.29 40 20C40 14.96 38.13 10.35 35.05 6.83L33.87 8.01C36.65 11.23 38.33 15.42 38.33 20C38.33 24.83 36.47 29.22 33.42 32.49Z" fill="#EF4E4B"/><path d="M32.69 9.19C35.17 12.1 36.67 15.88 36.67 20C36.67 24.37 34.99 28.34 32.24 31.31L27.2 26.27C28.42 24.9 29.3 23.61 29.9 22.41C31.38 19.47 31.21 17.14 30.38 15.5C29.93 14.62 29.28 13.9 28.51 13.37L32.69 9.19Z" fill="#EF4E4B"/><path d="M7.46 9.03L11.82 13.39C11.07 13.92 10.42 14.63 9.98 15.5C9.15 17.14 8.98 19.47 10.46 22.41C11.06 23.6 11.93 24.89 13.14 26.25L7.91 31.47C5.07 28.49 3.33 24.45 3.33 20C3.33 15.8 4.89 11.96 7.46 9.03Z" fill="#EF4E4B"/></svg>
  <div><h1>EMS Tactical View</h1><span class="sub">Live Field Operations</span></div>
  <span class="badge">● Live</span>
</div>

<div class="panel">
  <h3>Situation Board</h3>
  <div class="st"><span class="lb"><span class="dot" style="background:#EF4E4B"></span>Requests</span><span class="v" style="color:#EF4E4B" data-count="requests">—</span></div>
  <div class="st"><span class="lb"><span class="dot" style="background:#89CFF0"></span>Resources</span><span class="v" style="color:#89CFF0" data-count="resources">—</span></div>
  <div class="st"><span class="lb"><span class="dot" style="background:#0F1E2B;border:1.5px solid rgba(255,255,255,0.3)"></span>Reports</span><span class="v" style="color:rgba(255,255,255,0.7)" data-count="reports">—</span></div>
</div>

<div class="ctrls">
  <button class="btn on" onclick="setMode('pins',this)">Pins</button>
  <button class="btn" onclick="setMode('heat',this)">Heatmap</button>
  <button class="btn" onclick="setMode('urgency',this)">By Urgency</button>
  <button class="btn" onclick="toggle3D(this)">3D Terrain</button>
</div>



<script>
mapboxgl.accessToken='pk.eyJ1Ijoic29zY29ubmVjdCIsImEiOiJjbWxlNmwxMHUxN3hhM2Vwd2R0a2RjNWttIn0.Re0ubam0-wA5O5wkAHzyAw';
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[-82.45,29.19],zoom:9});
let t3d=false;
map.on('load',()=>{
  map.addSource('sos',{type:'vector',tiles:[location.origin+'/api/map/tiles/{z}/{x}/{y}'],minzoom:2,maxzoom:14});
  map.addSource('dem',{type:'raster-dem',url:'mapbox://mapbox.mapbox-terrain-dem-v1',tileSize:512});

  // Requests — SOS Red
  map.addLayer({id:'req-glow',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'request'],
    paint:{'circle-color':'#EF4E4B','circle-radius':14,'circle-opacity':0.2,'circle-blur':0.8}});
  map.addLayer({id:'req-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'request'],
    paint:{'circle-color':'#EF4E4B','circle-radius':7,'circle-stroke-width':2,'circle-stroke-color':'#fff'}});

  // Resources — SOS Light Blue
  map.addLayer({id:'res-glow',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'resource'],
    paint:{'circle-color':'#89CFF0','circle-radius':12,'circle-opacity':0.2}});
  map.addLayer({id:'res-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'resource'],
    paint:{'circle-color':'#89CFF0','circle-radius':6,'circle-stroke-width':2,'circle-stroke-color':'#fff'}});

  // Reports — SOS Navy
  map.addLayer({id:'rep-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'report'],
    paint:{'circle-color':'#0F1E2B','circle-radius':6,'circle-stroke-width':2,'circle-stroke-color':'rgba(255,255,255,0.4)'}});

  // Heatmap (hidden)
  map.addLayer({id:'heat',type:'heatmap',source:'sos','source-layer':'sos',filter:['==',['get','type'],'request'],
    layout:{visibility:'none'},
    paint:{'heatmap-weight':['match',['get','urgency'],'critical',1,'high',0.7,'medium',0.4,0.2],
      'heatmap-intensity':['interpolate',['linear'],['zoom'],0,1,9,3],
      'heatmap-color':['interpolate',['linear'],['heatmap-density'],0,'rgba(15,30,43,0)',0.25,'#0F1E2B',0.45,'#89CFF0',0.65,'#EF4E4B',0.85,'#FCD34D',1,'#fff'],
      'heatmap-radius':['interpolate',['linear'],['zoom'],0,4,12,30],'heatmap-opacity':0.85}});

  // Pulse
  (function anim(){const p=0.5+0.5*Math.sin(Date.now()/700);
    ['req-glow','res-glow'].forEach(id=>{if(map.getLayer(id)){map.setPaintProperty(id,'circle-opacity',0.12+p*0.15);map.setPaintProperty(id,'circle-radius',id==='req-glow'?12+p*4:10+p*3)}});
    requestAnimationFrame(anim)})();
});
const PL=['req-glow','req-pts','res-glow','res-pts','rep-pts'];
function setMode(m,b){document.querySelectorAll('.ctrls .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  if(m==='pins'){PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','visible')});if(map.getLayer('heat'))map.setLayoutProperty('heat','visibility','none');
    if(map.getLayer('req-pts'))map.setPaintProperty('req-pts','circle-radius',7)}
  else if(m==='heat'){PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','none')});if(map.getLayer('heat'))map.setLayoutProperty('heat','visibility','visible')}
  else if(m==='urgency'){PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','visible')});if(map.getLayer('heat'))map.setLayoutProperty('heat','visibility','none');
    if(map.getLayer('req-pts'))map.setPaintProperty('req-pts','circle-radius',['match',['get','urgency'],'critical',14,'high',10,'medium',7,5])}}
function toggle3D(b){t3d=!t3d;b.classList.toggle('on',t3d);
  if(t3d){map.setTerrain({source:'dem',exaggeration:1.5});map.easeTo({pitch:55,duration:1000})}
  else{map.setTerrain(null);map.easeTo({pitch:0,duration:1000})}}
</script><script>fetch("https://rtduqguwhkczexnoawej.supabase.co/rest/v1/rpc/map_counts",{method:"POST",headers:{"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZHVxZ3V3aGtjemV4bm9hd2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE2Njg1ODAsImV4cCI6MjA2NzI0NDU4MH0.1QZ5ofS-ND_OI71igPlxxMTyZJJRlATSSC0djccWR8o","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZHVxZ3V3aGtjemV4bm9hd2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE2Njg1ODAsImV4cCI6MjA2NzI0NDU4MH0.1QZ5ofS-ND_OI71igPlxxMTyZJJRlATSSC0djccWR8o","Content-Type":"application/json"}}).then(r=>r.json()).then(d=>{document.querySelectorAll("[data-count]").forEach(el=>{const k=el.dataset.count;if(d[k]!=null)el.textContent=d[k].toLocaleString()})}).catch(()=>{})</script></body></html>
