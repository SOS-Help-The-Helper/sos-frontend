<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOS | Federal Disaster Overview</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',sans-serif;background:#0F1E2B;color:#fff;overflow:hidden}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.overlay-top{position:absolute;top:0;left:0;right:0;z-index:10;
  background:linear-gradient(180deg,rgba(15,30,43,0.92) 0%,rgba(15,30,43,0) 100%);padding:20px 32px 40px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.brand h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400}
.brand .sub{font-size:11px;color:rgba(255,255,255,0.4);margin-left:8px}
.title-row{display:flex;align-items:baseline;gap:12px}
.title-row h2{font-family:'DM Serif Display',serif;font-size:32px;font-weight:400;color:#fff}
.title-row .tag{background:rgba(239,78,75,0.15);color:#EF4E4B;font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:0.8px}
.kpis{display:flex;gap:12px;margin-top:16px}
.kpi{background:rgba(15,30,43,0.7);backdrop-filter:blur(16px);border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);padding:16px 20px;min-width:160px}
.kpi .num{font-family:'DM Serif Display',serif;font-size:30px}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.3);margin-top:2px}

.overlay-bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(0deg,rgba(15,30,43,0.9) 0%,rgba(15,30,43,0) 100%);
  padding:40px 32px 20px;display:flex;justify-content:space-between;align-items:flex-end}
.leg{display:flex;gap:12px}
.leg-item{font-size:11px;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.controls{display:flex;gap:6px}
.btn{padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(15,30,43,0.7);backdrop-filter:blur(10px);color:rgba(255,255,255,0.7);
  font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.btn.on{border-color:#EF4E4B;color:#EF4E4B;background:rgba(239,78,75,0.08)}
@media(max-width:640px){
  .overlay-top{padding:14px 16px 30px}
  .brand{margin-bottom:10px;gap:8px}
  .brand h1{font-size:18px}
  .brand .sub{display:none}
  .title-row{gap:8px;flex-wrap:wrap}
  .title-row h2{font-size:22px}
  .kpis{gap:8px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .kpis::-webkit-scrollbar{display:none}
  .kpi{min-width:120px;flex:0 0 auto;padding:12px 16px}
  .kpi .num{font-size:24px}
  .overlay-bottom{padding:24px 16px 16px;justify-content:center}
  .leg{display:none}
  .controls{justify-content:center;gap:8px}
  .btn{min-height:44px;padding:0 18px;display:inline-flex;align-items:center}
}
</style></head><body>
<div id="map"></div>

<div class="overlay-top">
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><path d="M33.34 34.91L25.99 27.56C24.47 29.05 22.56 30.63 20.18 32.27C17.78 30.62 15.87 29.04 14.35 27.53L6.83 35.05C10.35 38.13 14.96 40 20 40C25.12 40 29.8 38.07 33.34 34.91Z" fill="#EF4E4B"/><path d="M26.84 12.55C24.88 11.94 22.66 12.3 21.15 13.86L20.18 14.87L19.21 13.86C17.69 12.29 15.45 11.93 13.49 12.56L6.33 5.4C9.9 2.05 14.71 0 20 0C25.37 0 30.24 2.11 33.83 5.55L26.84 12.55Z" fill="#EF4E4B"/><path d="M6.27 7.85L5.09 6.66C1.93 10.2 0 14.88 0 20C0 25.37 2.11 30.24 5.55 33.83L6.73 32.65C3.59 29.36 1.67 24.91 1.67 20C1.67 15.37 3.38 11.14 6.21 7.92L6.27 7.85Z" fill="#EF4E4B"/><path d="M33.42 32.49L34.6 33.67C37.95 30.1 40 25.29 40 20C40 14.96 38.13 10.35 35.05 6.83L33.87 8.01C36.65 11.23 38.33 15.42 38.33 20C38.33 24.83 36.47 29.22 33.42 32.49Z" fill="#EF4E4B"/><path d="M32.69 9.19C35.17 12.1 36.67 15.88 36.67 20C36.67 24.37 34.99 28.34 32.24 31.31L27.2 26.27C28.42 24.9 29.3 23.61 29.9 22.41C31.38 19.47 31.21 17.14 30.38 15.5C29.93 14.62 29.28 13.9 28.51 13.37L32.69 9.19Z" fill="#EF4E4B"/><path d="M7.46 9.03L11.82 13.39C11.07 13.92 10.42 14.63 9.98 15.5C9.15 17.14 8.98 19.47 10.46 22.41C11.06 23.6 11.93 24.89 13.14 26.25L7.91 31.47C5.07 28.49 3.33 24.45 3.33 20C3.33 15.8 4.89 11.96 7.46 9.03Z" fill="#EF4E4B"/></svg>
    <h1>SOS Connect</h1>
    <span class="sub">Federal Disaster Overview</span>
  </div>
  <div class="title-row">
    <h2>National Coordination</h2>
    <span class="tag">● Multi-State Active</span>
  </div>
  <div class="kpis">
    <div class="kpi"><div class="num" style="color:#EF4E4B" data-count="requests">—</div><div class="lbl">Active Requests</div></div>
    <div class="kpi"><div class="num" style="color:#89CFF0" data-count="resources">—</div><div class="lbl">Resources Deployed</div></div>
    <div class="kpi"><div class="num" style="color:rgba(255,255,255,0.6)" data-count="reports">—</div><div class="lbl">Field Reports</div></div>
    <div class="kpi"><div class="num" style="color:#34d399" data-count="matches">—</div><div class="lbl">Matches</div></div>
  </div>
</div>

<div class="overlay-bottom">
  <div class="leg">
    <span class="leg-item"><span class="dot" style="background:#EF4E4B"></span> Requests</span>
    <span class="leg-item"><span class="dot" style="background:#89CFF0"></span> Resources</span>
    <span class="leg-item"><span class="dot" style="background:#0F1E2B;border:2px solid rgba(255,255,255,0.25)"></span> Reports</span>
  </div>
  <div class="controls">
    <button class="btn on" onclick="setV('pins',this)">Pins</button>
    <button class="btn" onclick="setV('heat',this)">Density</button>
    <button class="btn" onclick="setV('globe',this)">Globe</button>
  </div>
</div>

<script>
mapboxgl.accessToken='pk.eyJ1Ijoic29zY29ubmVjdCIsImEiOiJjbWxlNmwxMHUxN3hhM2Vwd2R0a2RjNWttIn0.Re0ubam0-wA5O5wkAHzyAw';
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',
  center:[-98,39],zoom:3.8,projection:'mercator'});

map.on('load',()=>{
  map.addSource('sos',{type:'vector',tiles:[location.origin+'/api/map/tiles/{z}/{x}/{y}'],minzoom:2,maxzoom:14});

  // Heatmap (hidden initially)
  map.addLayer({id:'req-heat',type:'heatmap',source:'sos','source-layer':'sos',
    filter:['==',['get','type'],'request'],layout:{visibility:'none'},
    paint:{'heatmap-weight':['match',['get','urgency'],'critical',1,'high',0.7,'medium',0.4,0.2],
      'heatmap-intensity':['interpolate',['linear'],['zoom'],0,0.3,6,1.5],
      'heatmap-color':['interpolate',['linear'],['heatmap-density'],0,'rgba(15,30,43,0)',0.2,'#0F1E2B',0.4,'#89CFF0',0.6,'#EF4E4B',0.8,'#FCD34D',1,'#fff'],
      'heatmap-radius':['interpolate',['linear'],['zoom'],0,8,8,40],'heatmap-opacity':0.8}});

  // Requests — SOS Red
  map.addLayer({id:'req-glow',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'request'],
    paint:{'circle-color':'#EF4E4B','circle-radius':['interpolate',['linear'],['zoom'],3,4,8,12],
      'circle-opacity':0.2,'circle-blur':0.6}});
  map.addLayer({id:'req-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'request'],
    paint:{'circle-color':'#EF4E4B','circle-radius':['interpolate',['linear'],['zoom'],3,3,8,6],
      'circle-stroke-width':1,'circle-stroke-color':'#fff'}});

  // Resources — SOS Light Blue
  map.addLayer({id:'res-glow',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'resource'],
    paint:{'circle-color':'#89CFF0','circle-radius':['interpolate',['linear'],['zoom'],3,3,8,10],'circle-opacity':0.15}});
  map.addLayer({id:'res-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'resource'],
    paint:{'circle-color':'#89CFF0','circle-radius':['interpolate',['linear'],['zoom'],3,2,8,5],
      'circle-stroke-width':1,'circle-stroke-color':'#fff'}});

  // Reports — SOS Navy
  map.addLayer({id:'rep-pts',type:'circle',source:'sos','source-layer':'sos',filter:['==',['get','type'],'report'],
    paint:{'circle-color':'#0F1E2B','circle-radius':['interpolate',['linear'],['zoom'],3,2,8,5],
      'circle-stroke-width':1.5,'circle-stroke-color':'rgba(15,30,43,0.4)'}});

  // Atmosphere for globe
  map.setFog({'color':'#0F1E2B','high-color':'#0F1E2B','horizon-blend':0.08,'space-color':'#000','star-intensity':0.15});
});

const PL=['req-glow','req-pts','res-glow','res-pts','rep-pts'];
function setV(v,b){
  document.querySelectorAll('.controls .btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  if(v==='pins'){
    PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','visible')});
    if(map.getLayer('req-heat'))map.setLayoutProperty('req-heat','visibility','none');
    map.setProjection('mercator');map.easeTo({pitch:0,duration:800});
  }else if(v==='heat'){
    PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','none')});
    if(map.getLayer('req-heat'))map.setLayoutProperty('req-heat','visibility','visible');
    map.setProjection('mercator');
  }else if(v==='globe'){
    PL.forEach(id=>{if(map.getLayer(id))map.setLayoutProperty(id,'visibility','visible')});
    if(map.getLayer('req-heat'))map.setLayoutProperty('req-heat','visibility','none');
    map.setProjection('globe');map.easeTo({zoom:2.5,pitch:20,duration:1500});
  }
}
</script><script>fetch("https://rtduqguwhkczexnoawej.supabase.co/rest/v1/rpc/map_counts",{method:"POST",headers:{"apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZHVxZ3V3aGtjemV4bm9hd2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE2Njg1ODAsImV4cCI6MjA2NzI0NDU4MH0.1QZ5ofS-ND_OI71igPlxxMTyZJJRlATSSC0djccWR8o","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZHVxZ3V3aGtjemV4bm9hd2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE2Njg1ODAsImV4cCI6MjA2NzI0NDU4MH0.1QZ5ofS-ND_OI71igPlxxMTyZJJRlATSSC0djccWR8o","Content-Type":"application/json"}}).then(r=>r.json()).then(d=>{document.querySelectorAll("[data-count]").forEach(el=>{const k=el.dataset.count;if(d[k]!=null)el.textContent=d[k].toLocaleString()})}).catch(()=>{})</script></body></html>
